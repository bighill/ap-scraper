<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css.css">
</head>
<body>

  <main>
    <div id="controls" class="controls" hidden>
      <span id="count-badge" class="count-badge"></span>
      <label class="images-toggle">
        <input id="show-images" type="checkbox" checked>
        <span>Images</span>
      </label>
      <button id="toggle-view" type="button">Show hidden</button>
    </div>
    <p id="status" class="status" role="status" aria-live="polite">Loading…</p>
    <ul id="list" class="article-list" hidden></ul>
  </main>

  <noscript>
    <p class="noscript">JavaScript is required to load articles from this server.</p>
  </noscript>

  <script src="/js.js" defer></script>
</body>
</html>
