<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css.css">
</head>
<body>

  <main>
    <div id="controls" class="controls" hidden>
      <span id="count-badge" class="count-badge"></span>
      <label class="images-toggle">
        <input id="show-images" type="checkbox" checked>
        <span>Images</span>
      </label>
      <button id="toggle-view" type="button">Show hidden</button>
    </div>
    <p id="status" class="status" role="status" aria-live="polite">Loading…</p>

    <div id="list-view">
      <ul id="list" class="article-list" hidden></ul>
    </div>

    <div id="detail-view" hidden>
      <nav class="detail-nav">
        <button id="back-btn" type="button">← Back</button>
        <a id="detail-external" href="#" target="_blank" rel="noopener noreferrer">Read on AP News →</a>
      </nav>
      <article id="detail-article">
        <h1 id="detail-title"></h1>
        <p id="detail-meta" class="article-meta"></p>
        <img id="detail-image" class="article-thumb" alt="">
        <div id="detail-content" class="detail-content"></div>
      </article>
    </div>

    <noscript>
      <p class="noscript">JavaScript is required to load articles from this server.</p>
    </noscript>
  </main>

  <script src="/js.js" defer></script>
</body>
</html>
