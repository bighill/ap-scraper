<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css.css">
</head>
<body>

  <main>

    <!-- controls -->
    <div id="controls" class="controls" hidden>
      <span class="count-badge">
        <button id="show-visible" class="count-btn" type="button"></button>
        <span class="count-sep" aria-hidden="true">|</span>
        <button id="show-hidden" class="count-btn" type="button"></button>
      </span>
      <label class="images-toggle">
        <input id="show-images" type="checkbox" checked>
        <span>Images</span>
      </label>
    </div>

    <!-- list pane -->
    <div id="list-view">
      <ul id="list" class="article-list" hidden></ul>
    </div>

    <!-- detail pane -->
    <div id="detail-view" hidden>
      <nav class="detail-nav">
        <button id="back-btn" type="button">← Back</button>
      </nav>
      <article id="detail-article">
        <h1 id="detail-title"></h1>
        <p id="detail-meta" class="article-meta"></p>
        <img id="detail-image" class="article-thumb" alt="">
        <div id="detail-content" class="detail-content"></div>
        <a id="detail-external" class="detail-external" href="#" target="_blank" rel="noopener noreferrer">Read on AP News</a>
      </article>
    </div>

    <!-- shove off -->
    <noscript>
      <p class="noscript">JavaScript is required to load articles from this server.</p>
    </noscript>

  </main>

  <script src="/js.js" defer></script>
</body>
</html>
