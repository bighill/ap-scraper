<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP World News — reader</title>
  <link rel="stylesheet" href="/css.css">
</head>
<body>
  <header class="site-header">
    <h1>AP World News</h1>
    <p class="tagline">Articles from the local scraper cache</p>
  </header>
  <main>
    <p id="status" class="status" role="status" aria-live="polite">Loading…</p>
    <ul id="list" class="article-list" hidden></ul>
  </main>
  <noscript>
    <p class="noscript">JavaScript is required to load articles from this server.</p>
  </noscript>
  <script src="/js.js" defer></script>
</body>
</html>
